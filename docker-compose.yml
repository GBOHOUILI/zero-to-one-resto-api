services:
  postgres:
    image: postgres:latest
    container_name: zero-db
    restart: always
    environment:
      POSTGRES_PASSWORD: Zero-to-one@2005
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: zero-redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data:
